services:
  # ── PDF-Parser API ────────────────────────────────────────────────────────
  pdf-parser:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Required for the /llm/recommend endpoint (OpenRouter-powered parser suggestions)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      # Persist uploaded PDFs and parser artifacts across container restarts
      - pdf_uploads:/app/backend/uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - pdf-parser
    environment:
      - NEXT_PUBLIC_API_URL=http://pdf-parser:8000

volumes:
  pdf_uploads:
